services:
  - type: web
    name: xylo-core
    env: rust
    repo: https://github.com/foxyvio/Xylo
    plan: free
    region: ohio
    buildCommand: "cd xylo-core && cargo build --release"
    startCommand: "cd xylo-core && ./target/release/xylo-core"
    envVars:
      - key: PORT
        value: 10000
      - key: RUST_LOG
        value: xylo_core=info
      - key: PASETO_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromService:
          name: xylo-db
          type: database
          property: connectionString

  - type: static
    name: xylo-web
    env: static
    repo: https://github.com/your-username/xylo # Replace with actual repo
    plan: free
    region: ohio
    buildCommand: "cd xylo-web && flutter build web --wasm"
    publishPath: xylo-web/build/web
    envVars:
      - key: API_BASE_URL
        fromService:
          name: xylo-core
          type: web
          property: url

databases:
  - name: xylo-db
    plan: free
    region: ohio
